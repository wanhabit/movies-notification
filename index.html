<!DOCTYPE html>
<html>

<head>
    <title>Notification</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ikuti notifikasi film terbaru WAN-DB melalui Telegram dan WhatsApp channel.">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="image/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="image/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="image/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="image/favicon/favicon-16x16.png">
    <link rel="manifest" href="image/favicon/site.webmanifest">
</head>

<body>
    <div class="line"></div>
    <div class="logo-contain">
        <a href="https://notification.wanhabit.com">
            <img class="logo" src="image/icon-pemberitahuan.svg" alt="NOTIFICATION">
        </a>
    </div>
    <div class="title-header">
        <div class="nameTitle">
            NOTIFICATION
        </div>
        <div class="suggest-media">
            Ikuti channel kami untuk mendapatkan <span class="text-bold">notifikasi</span><br>setiap kali ada film atau
            series baru yang ditambahkan ke database
        </div>
        <div class="suggest-title suggest-media">
            Pilih channel notifikasi di bawah ini<br>Stay Updated!
        </div>
    </div>
    <div class="notification-link-container">
        <div class="gridContainer">
            <a class="notification-link" href="https://t.me/wanencode">
                <img src="image/telegram.svg">
                <div>TELEGRAM</div>
            </a>
            <a class="notification-link" href="https://whatsapp.com/channel/0029VbCRpdhI7BeKb33Nqi3p">
                <img class="whatsapp" src="image/WhatsApp.svg">
                <div>WHATSAPP</div>
            </a>
        </div>
    </div>
    <div class="contain-back">
        <a href="https://wanhabit.com/" class="back-button">
            BACK
        </a>
    </div>
    <div class="telegram-contain">
        <div class="suggest-media">Ikuti <a href="https://notification.wanhabit.com/">notifikasi</a> kami<br>untuk
            update
            film terbaru</div>
        <div class="c-wan">&copy;<span class="current-year"></span> WAN&trade;</div>
    </div>
    <div class="line-footer"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const yearElements = document.querySelectorAll('.current-year');
            const currentYear = new Date().getFullYear();
            yearElements.forEach(function (element) {
                element.textContent = currentYear;
            });
        });
    </script>
</body>

</html>
